# --------------- FOR MAC LIMA DEV --------------------

# ubuntu 24.04
images:
- location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  arch: "x86_64"
- location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-arm64.img"
  arch: "aarch64"

cpus: 2
memory: "4GiB"

# mounts to edit
mounts:
- location: "~"
  writable: true
- location: "/tmp/lima"
  writable: true

# get ebpf dependencies
provision:
- mode: system
  script: |
    apt-get update
    apt-get install -y \
      build-essential \
      git \
      cmake \
      libelf-dev \
      clang \
      llvm \
      libbpf-dev \
      linux-headers-$(uname -r) \
      bpfcc-tools \
      python3-bpfcc \
      libbpfcc-dev
